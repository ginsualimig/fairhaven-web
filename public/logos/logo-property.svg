<!-- Fairhaven Property – wordmark, matched to the Fairhaven Advisory sister-brand mark (Option C), Navy + Gold version for light backgrounds -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none" role="img" aria-label="Fairhaven Property">
  <!-- Gold corner-bracket accent (survey/site mark) -->
  <rect x="10" y="10" width="18" height="2" fill="#D4AF37"/>
  <rect x="10" y="10" width="2" height="18" fill="#D4AF37"/>
  <rect x="46" y="68" width="18" height="2" fill="#D4AF37"/>
  <rect x="62" y="52" width="2" height="18" fill="#D4AF37"/>

  <!-- Primary wordmark -->
  <text x="78" y="34" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="#1A3A52" letter-spacing="1">FAIRHAVEN</text>
  <text x="78" y="70" font-family="Georgia, 'Times New Roman', serif" font-size="23" font-weight="400" fill="#1A3A52" letter-spacing="3.5">PROPERTY</text>

  <!-- Thin gold rule between lines -->
  <rect x="78" y="44" width="185" height="0.75" fill="#D4AF37" opacity="0.6"/>
</svg>
